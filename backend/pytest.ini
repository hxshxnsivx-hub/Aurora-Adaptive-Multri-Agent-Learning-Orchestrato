[pytest]
# Pytest configuration for Adaptive Learning Platform
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Coverage settings
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-branch

# Markers for test organization
markers =
    unit: Unit tests for individual components
    integration: Integration tests for API endpoints
    property: Property-based tests using Hypothesis
    slow: Tests that take longer to run
    external: Tests that require external API access
    agent: Tests for AI agents
    api: Tests for API endpoints
    database: Tests requiring database access

# Hypothesis profile settings
hypothesis_profile = dev

# Warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning

# Test discovery patterns
norecursedirs = .git .tox dist build *.egg __pycache__ .venv venv

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (in seconds)
timeout = 300
timeout_method = thread
